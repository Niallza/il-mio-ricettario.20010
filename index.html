<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Ricette</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>
    <h1>Test Funzionamento</h1>
    <button onclick="document.getElementById('f').click()" style="padding:20px; background:blue; color:white;">📸 PROVA FOTOCAMERA</button>
    <input type="file" id="f" accept="image/*" style="display:none" onchange="testOCR(this)">
    <div id="status"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBhp8YLfgCnD2PZ3AZ6oB2xb5dXJ19c-Fc",
            authDomain: "ricettario-laboratorio-92621.firebaseapp.com",
            databaseURL: "https://ricettario-laboratorio-92621-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "ricettario-laboratorio-92621",
            storageBucket: "ricettario-laboratorio-92621.firebasestorage.app",
            messagingSenderId: "393684653408",
            appId: "1:393684653408:web:4376ed5d6c76d0adcc3a05"
        };
        firebase.initializeApp(firebaseConfig);
        
        async function testOCR(input) {
            const status = document.getElementById('status');
            status.innerText = "Caricamento in corso...";
            const fd = new FormData();
            fd.append("file", input.files[0]);
            fd.append("apikey", "K81062382588957");
            fd.append("language", "ita");

            try {
                const res = await fetch("https://api.ocr.space/parse/image", { method: "POST", body: fd });
                const j = await res.json();
                status.innerText = "Risultato: " + JSON.stringify(j);
            } catch(e) {
                status.innerText = "Errore: " + e.message;
            }
        }
    </script>
</body>
</html>
