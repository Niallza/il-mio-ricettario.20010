<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ricettario Smart</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #ff4757; --bg: #f1f2f6; --card: #ffffff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px 15px 100px; }
        .container { background: var(--card); padding: 25px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 500px; margin: auto; }
        h2 { color: var(--primary); margin-top: 0; }
        #status { color: #5856d6; font-weight: bold; margin: 15px 0; font-size: 14px; min-height: 1.2em; }
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; border-radius: 15px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; font-family: inherit; }
        button { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-photo { background: #5856d6; color: white; margin-bottom: 10px; }
        .btn-save { background: var(--primary); color: white; }
        #lista { margin-top: 30px; text-align: left; }
        .item { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 5px solid var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>🍳 Nuova Ricetta</h2>
    <div id="status">Pronto per caricare</div>
    
    <button class="btn-photo" id="btn-foto" onclick="document.getElementById('file-in').click()">📸 LEGGI SCRITTURA A MANO</button>
    <input type="file" id="file-in" accept="image/*" style="display:none" onchange="elabora(this)">
    
    <input type="text" id="tit" placeholder="Titolo della ricetta">
    <textarea id="ing" rows="8" placeholder="Gli ingredienti appariranno qui..."></textarea>
    
    <button class="btn-save" onclick="salva()">💾 SALVA RICETTA</button>
</div>

<div id="lista"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBhp8YLfgCnD2PZ3AZ6oB2xb5dXJ19c-Fc",
        authDomain: "ricettario-laboratorio-92621.firebaseapp.com",
        databaseURL: "https://ricettario-laboratorio-92621-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "ricettario-laboratorio-92621",
        storageBucket: "ricettario-laboratorio-92621.firebasestorage.app",
        messagingSenderId: "393684653408",
        appId: "1:393684653408:web:4376ed5d6c76d0adcc3a05"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref('ricette').on('value', s => {
        const d = s.val();
        document.getElementById('lista').innerHTML = d ? Object.keys(d).map(k => `<div class="item">${d[k].title}</div>`).join('') : '';
    });

    async function elabora(input) {
        if (!input.files[0]) return;
        const msg = document.getElementById('status');
        const btn = document.getElementById('btn-foto');
        
        msg.innerText = "⏳ Ottimizzazione per scrittura a mano...";
        btn.disabled = true;

        const reader = new FileReader();
        reader.readAsDataURL(input.files[0]);
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                // Ridimensionamento per massima velocità
                let w = img.width;
                let h = img.height;
                const max = 1000;
                if (w > h) { if (w > max) { h *= max / w; w = max; } }
                else { if (h > max) { w *= max / h; h = max; } }
                
                canvas.width = w; canvas.height = h;
                ctx.drawImage(img, 0, 0, w, h);
                
                canvas.toBlob(async (blob) => {
                    msg.innerText = "🚀 IA sta decifrando la grafia...";
                    const fd = new FormData();
                    fd.append("file", blob, "image.jpg");
                    fd.append("apikey", "K81062382588957");
                    fd.append("language", "ita");
                    fd.append("OCREngine", "2"); // Motore ottimizzato per grafia manuale

                    try {
                        const response = await fetch("https://api.ocr.space/parse/image", { method: "POST", body: fd });
                        const data = await response.json();
                        if (data.ParsedResults && data.ParsedResults.length > 0) {
                            document.getElementById('ing').value = data.ParsedResults[0].ParsedText;
                            msg.innerText = "✅ Lettura completata!";
