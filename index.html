<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ricettario Smart</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f1f2f6; padding: 20px; text-align: center; }
        .box { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        #status { color: #5856d6; font-weight: bold; margin: 15px 0; min-height: 1.5em; }
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-photo { background: #5856d6; color: white; margin-bottom: 10px; }
        .btn-save { background: #ff4757; color: white; }
    </style>
</head>
<body>

<div class="box">
    <h2>🍳 Nuova Ricetta</h2>
    <div id="status">Seleziona una foto</div>
    
    <button class="btn-photo" id="btn-foto" onclick="document.getElementById('file-in').click()">📸 SCATTA O CARICA FOTO</button>
    <input type="file" id="file-in" accept="image/*" style="display:none" onchange="analizza(this)">
    
    <input type="text" id="tit" placeholder="Titolo della ricetta">
    <textarea id="ing" rows="8" placeholder="Il testo apparirà qui..."></textarea>
    
    <button class="btn-save" onclick="salva()">💾 SALVA NEL DATABASE</button>
</div>

<script>
    // Configurazione Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBhp8YLfgCnD2PZ3AZ6oB2xb5dXJ19c-Fc",
        authDomain: "ricettario-laboratorio-92621.firebaseapp.com",
        databaseURL: "https://ricettario-laboratorio-92621-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "ricettario-laboratorio-92621",
        storageBucket: "ricettario-laboratorio-92621.firebasestorage.app",
        messagingSenderId: "393684653408",
        appId: "1:393684653408:web:4376ed5d6c76d0adcc3a05"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    async function analizza(input) {
        if (!input.files[0]) return;
        const msg = document.getElementById('status');
        const area = document.getElementById('ing');
        msg.innerText = "⏳ Caricamento foto...";

        const fd = new FormData();
        fd.append("file", input.files[0]);
        fd.append("apikey", "K81062382588957");
        fd.append("language", "ita");
        fd.append("isTable", "true"); // Aiuta a leggere meglio le liste ingredienti
        fd.append("OCREngine", "2");

        try {
            const response = await fetch("https://api.ocr.space/parse/image", {
                method: "POST",
                body: fd
            });
            
            const data = await response.json();
            
            if (data && data.ParsedResults && data.ParsedResults[0]) {
                const risultato = data.ParsedResults[0].ParsedText;
                if (risultato) {
                    area.value = risultato;
                    msg.innerText = "✅ Testo inserito correttamente!";
                } else {
                    msg.innerText = "⚠️ Nessun testo trovato.";
                }
            } else {
                msg.innerText = "❌ Errore IA: " + (data.ErrorMessage || "Riprova");
            }
        } catch (err) {
            msg.innerText = "❌ Errore di rete. Controlla connessione.";
            alert("Errore tecnico: " + err.message);
        }
    }

    function salva() {
        const t = document.getElementById('tit').value;
        const i = document.getElementById('ing').value;
        if (!t) return alert("Metti un titolo!");
        db.ref('ricette').push({ title: t, ing: i }).then(() => {
            alert("Salvata con successo!");
            location.reload();
        });
    }
</script>
</body>
</html>
