<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mein Rezeptbuch Pro</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #007aff; --success: #34c759; --danger: #ff3b30; --bg: #f2f2f7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px 15px 100px; overflow-x: hidden; }
        
        h1 { font-size: 26px; font-weight: 800; margin: 10px 0 20px; color: #1c1c1e; text-align: center; text-transform: uppercase; }

        /* Griglia Cartelle Style iPhone */
        .folder-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .folder { 
            height: 140px; border-radius: 24px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; color: white; font-weight: bold; 
            font-size: 16px; box-shadow: 0 8px 15px rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.2s;
        }
        .folder:active { transform: scale(0.95); }
        .folder-icon { font-size: 40px; margin-bottom: 10px; }
        .folder-count { font-size: 12px; opacity: 0.8; margin-top: 5px; }

        /* Colori Cartelle */
        .f-kalt { background: #2c5282; }
        .f-warm { background: #d69e2e; }
        .f-haupt { background: #9b2c2c; }
        .f-beil { background: #2f855a; }
        .f-dessert { background: #805ad5; }
        .f-andere { background: #4a5568; }

        /* Vista Lista Ricette (sotto-cartella) */
        #folder-view { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg); z-index: 200; padding: 40px 15px; box-sizing: border-box; overflow-y: auto;
        }
        .recipe-item { 
            background: white; padding: 18px; border-radius: 16px; margin-bottom: 10px; 
            display: flex; justify-content: space-between; font-weight: 600; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* Vista Dettaglio Ricetta */
        #detail-view { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; z-index: 300; padding: 40px 20px; box-sizing: border-box; overflow-y: auto;
        }
        .section-title { font-size: 14px; color: var(--primary); font-weight: bold; text-transform: uppercase; margin-top: 25px; display: block; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .content-text { white-space: pre-wrap; line-height: 1.6; font-size: 18px; margin-top: 10px; display: block; }

        /* Floating Button (X) */
        .fab { position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px; background: var(--danger); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; z-index: 100; box-shadow: 0 5px 15px rgba(255,59,48,0.4); }

        /* Form Inserimento */
        #form-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 400; padding: 40px 20px; box-sizing: border-box; overflow-y: auto; }
        input, textarea, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        .btn-save { background: var(--success); color: white; border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: bold; font-size: 18px; }
        .btn-close { background: #e5e5ea; border: none; padding: 10px; border-radius: 10px; width: 100%; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="main-content">
        <h1>LE MIE RICETTE</h1>
        <div class="folder-grid">
            <div class="folder f-kalt" onclick="apriCartella('Vorspeisen')">
                <span class="folder-icon">🥗</span><span>KALT</span><span class="folder-count" id="count-Vorspeisen">0</span>
            </div>
            <div class="folder f-warm" onclick="apriCartella('Warme Vorspeisen')">
                <span class="folder-icon">🥘</span><span>WARM</span><span class="folder-count" id="count-Warme Vorspeisen">0</span>
            </div>
            <div class="folder f-haupt" onclick="apriCartella('Hauptspeisen')">
                <span class="folder-icon">🍝</span><span>HAUPT</span><span class="folder-count" id="count-Hauptspeisen">0</span>
            </div>
            <div class="folder f-beil" onclick="apriCartella('Beilagen')">
                <span class="folder-icon">🥦</span><span>BEILAGEN</span><span class="folder-count" id="count-Beilagen">0</span>
            </div>
            <div class="folder f-dessert" onclick="apriCartella('Desserts')">
                <span class="folder-icon">🍰</span><span>DESSERT</span><span class="folder-count" id="count-Desserts">0</span>
            </div>
            <div class="folder f-andere" onclick="apriCartella('Sonstiges')">
                <span class="folder-icon">📦</span><span>ANDERE</span><span class="folder-count" id="count-Sonstiges">0</span>
            </div>
        </div>
    </div>

    <div class="fab" onclick="document.getElementById('form-view').style.display='block'">+</div>

    <div id="folder-view">
        <button class="btn-close" onclick="document.getElementById('folder-view').style.display='none'">← Indietro</button>
        <h2 id="folder-title" style="text-align:center"></h2>
        <div id="lista-ricette-cartella"></div>
    </div>

    <div id="detail-view">
        <button class="btn-close" onclick="document.getElementById('detail-view').style.display='none'">← Indietro</button>
        <h2 id="det-title" style="margin-bottom:5px"></h2>
        <span class="section-title">Ingredienti & Passaggi</span>
        <span id="det-ing" class="content-text"></span>
    </div>

    <div id="form-view">
        <button class="btn-close" onclick="document.getElementById('form-view').style.display='none'">Annulla</button>
        <input type="text" id="tit" placeholder="Titolo Ricetta">
        <select id="categoria">
            <option value="Vorspeisen">🥗 Kalt</option>
            <option value="Warme Vorspeisen">🥘 Warm</option>
            <option value="Hauptspeisen">🍝 Haupt</option>
            <option value="Beilagen">🥦 Beilagen</option>
            <option value="Desserts">🍰 Dessert</option>
            <option value="Sonstiges">📦 Andere</option>
        </select>
        <textarea id="ing" rows="10" placeholder="Scansiona ingredienti e passaggi..."></textarea>
        <button class="btn-save" onclick="salva()">💾 SALVA</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBhp8YLfgCnD2PZ3AZ6oB2xb5dXJ19c-Fc",
            authDomain: "ricettario-laboratorio-92621.firebaseapp.com",
            databaseURL: "https://ricettario-laboratorio-92621-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "ricettario-laboratorio-92621",
            storageBucket: "ricettario-laboratorio-92621.firebasestorage.app",
            messagingSenderId: "393684653408",
            appId: "1:393684653408:web:4376ed5d6c76d0adcc3a05"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let tutteLeRicette = [];

        db.ref('ricette').on('value', s => {
            const data = s.val();
            tutteLeRicette = data ? Object.keys(data).map(id => ({...data[id], id})) : [];
            aggiornaContatori();
        });

        function aggiornaContatori() {
            const cats = ["Vorspeisen", "Warme Vorspeisen", "Hauptspeisen", "Beilagen", "Desserts", "Sonstiges"];
            cats.forEach(c => {
                const num = tutteLeRicette.filter(r => r.categoria === c).length;
                document.getElementById('count-' + c).innerText = num + (num === 1 ? " Ricetta" : " Ricette");
            });
        }

        function apriCartella(cat) {
            document.getElementById('folder-title').innerText = cat.toUpperCase();
            const lista = document.getElementById('lista-ricette-cartella');
            lista.innerHTML = "";
            
            // Filtra e ordina in ALFABETICO
            const filtrate = tutteLeRicette
                .filter(r => r.categoria === cat)
                .sort((a, b) => a.title.localeCompare(b.title));

            filtrate.forEach(r => {
                lista.innerHTML += `
                    <div class="recipe-item" onclick="apriDettaglio('${r.id}')">
                        <span>${r.title}</span><span>›</span>
                    </div>`;
            });
            document.getElementById('folder-view').style.display = 'block';
        }

        function apriDettaglio(id) {
            const r = tutteLeRicette.find(x => x.id === id);
            document.getElementById('det-title').innerText = r.title;
            document.getElementById('det-ing').innerText = r.ing;
            document.getElementById('detail-view').style.display = 'block';
        }

        function salva() {
            const t = document.getElementById('tit').value;
            const c = document.getElementById('categoria').value;
            const i = document.getElementById('ing').value;
            if(!t) return alert("Manca il titolo!");
            db.ref('ricette').push({ title: t, categoria: c, ing: i }).then(() => {
                document.getElementById('tit').value = "";
                document.getElementById('ing').value = "";
                document.getElementById('form-view').style.display = 'none';
            });
        }
    </script>
</body>
</html>
