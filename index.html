<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ricettario Smart</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f4f9; margin: 0; padding: 20px; text-align: center; }
        .container { background: white; padding: 25px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h2 { color: #ff4757; margin-top: 0; }
        #status { color: #5856d6; font-weight: bold; margin: 15px 0; min-height: 20px; font-size: 14px; }
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; border-radius: 15px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-photo { background: #5856d6; color: white; margin-bottom: 10px; }
        .btn-save { background: #ff4757; color: white; }
        #preview { max-width: 100%; border-radius: 15px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>🍳 Nuovo Piatto</h2>
    <div id="status">Pronto per scattare</div>
    
    <button class="btn-photo" id="btn-foto" onclick="document.getElementById('file-in').click()">📸 LEGGI TESTO DA FOTO</button>
    <input type="file" id="file-in" accept="image/*" style="display:none" onchange="elaboraImmagine(this)">
    
    <canvas id="hidden-canvas" style="display:none;"></canvas>
    <img id="preview">

    <input type="text" id="tit" placeholder="Titolo ricetta">
    <textarea id="ing" rows="6" placeholder="Gli ingredienti appariranno qui dopo la foto..."></textarea>
    
    <button class="btn-save" onclick="salva()">💾 SALVA RICETTA</button>
</div>

<script>
    // Configurazione Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBhp8YLfgCnD2PZ3AZ6oB2xb5dXJ19c-Fc",
        authDomain: "ricettario-laboratorio-92621.firebaseapp.com",
        databaseURL: "https://ricettario-laboratorio-92621-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "ricettario-laboratorio-92621",
        storageBucket: "ricettario-laboratorio-92621.firebasestorage.app",
        messagingSenderId: "393684653408",
        appId: "1:393684653408:web:4376ed5d6c76d0adcc3a05"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    async function elaboraImmagine(input) {
        if (!input.files[0]) return;
        const status = document.getElementById('status');
        const btn = document.getElementById('btn-foto');
        const ingField = document.getElementById('ing');
        
        status.innerText = "⏳ Ottimizzazione immagine...";
        btn.disabled = true;

        const reader = new FileReader();
        reader.readAsDataURL(input.files[0]);
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.getElementById('hidden-canvas');
                const ctx = canvas.getContext('2d');
                
                // Rimpiccioliamo la foto a max 800px per lato (velocissimo da inviare)
                let width = img.width;
                let height = img.height;
                const max = 800;
                if (width > height) { if (width > max) { height *= max / width; width = max; } }
                else { if (height > max) { width *= max / height; height = max; } }
                
                canvas.width = width;
                canvas.height = height;
                ctx.drawImage(img, 0, 0, width, height);
                
                // Trasformiamo in JPG leggero
                canvas.toBlob(async (blob) => {
                    status.innerText = "🚀 IA sta leggendo (attendere)...";
                    
                    const fd = new FormData();
                    fd.append("file", blob, "image.jpg");
                    fd.append("apikey", "K81062382588957");
                    fd.append("language", "ita");

                    try {
                        const response = await fetch("https://api.ocr.space/parse/image", {
                            method: "POST",
                            body: fd
                        });
                        const data = await response.json();
                        
                        if (data.ParsedResults && data.ParsedResults.length > 0) {
                            ingField.value = data.ParsedResults[0].ParsedText;
                            status.innerText = "✅ Testo letto con successo!";
                        } else {
                            status.innerText = "❌ Errore: Foto non chiara.";
                        }
                    } catch (err) {
                        status.innerText = "❌ Errore di rete. Riprova con meno luce.";
                    } finally {
                        btn.disabled = false;
                    }
                }, 'image/jpeg', 0.6); // Qualità 60% per essere super leggero
            };
        };
    }

    function salva() {
        const t = document.getElementById('tit').value;
        const i = document.getElementById('ing').value;
        if (!t) return alert("Inserisci un titolo!");
        db.ref('ricette').push({ title: t, ing: i }).then(() => {
            alert("✅ Salvata!");
            location.reload();
        });
    }
</script>
</body>
</html>
