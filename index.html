<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ricettario Rapido</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f0f7; padding: 20px; text-align: center; }
        .app-card { background: white; padding: 25px; border-radius: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        h2 { color: #ff4757; }
        #msg { color: #5856d6; font-weight: bold; margin: 10px 0; font-size: 14px; min-height: 1.2em; }
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-camera { background: #5856d6; color: white; margin-bottom: 10px; }
        .btn-save { background: #ff4757; color: white; }
    </style>
</head>
<body>

<div class="app-card">
    <h2>🍳 Scansiona Ricetta</h2>
    <div id="msg">In attesa di foto...</div>
    
    <button class="btn-camera" id="btn-foto" onclick="document.getElementById('file-in').click()">📸 SCATTA O CARICA FOTO</button>
    <input type="file" id="file-in" accept="image/*" style="display:none" onchange="analizzaFoto(this)">
    
    <input type="text" id="t" placeholder="Titolo ricetta">
    <textarea id="i" rows="7" placeholder="Gli ingredienti appariranno qui..."></textarea>
    
    <button class="btn-save" onclick="salva()">💾 SALVA RICETTA</button>
</div>

<script>
    // Inizializzazione Firebase istantanea
    const firebaseConfig = {
        apiKey: "AIzaSyBhp8YLfgCnD2PZ3AZ6oB2xb5dXJ19c-Fc",
        authDomain: "ricettario-laboratorio-92621.firebaseapp.com",
        databaseURL: "https://ricettario-laboratorio-92621-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "ricettario-laboratorio-92621",
        storageBucket: "ricettario-laboratorio-92621.firebasestorage.app",
        messagingSenderId: "393684653408",
        appId: "1:393684653408:web:4376ed5d6c76d0adcc3a05"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    async function analizzaFoto(input) {
        if (!input.files[0]) return;
        const msg = document.getElementById('msg');
        const btn = document.getElementById('btn-foto');
        
        msg.innerText = "⏳ Ottimizzazione per iPhone...";
        btn.disabled = true;

        const reader = new FileReader();
        reader.readAsDataURL(input.files[0]);
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                // DIMENSIONE ULTRA-LIGHT: 600px (molto veloce da inviare)
                let w = img.width;
                let h = img.height;
                const scale = Math.min(600 / w, 600 / h);
                canvas.width = w * scale;
                canvas.height = h * scale;
                
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                canvas.toBlob(async (blob) => {
                    msg.innerText = "🚀 IA sta leggendo... (quasi fatto)";
                    
                    const fd = new FormData();
                    fd.append("file", blob, "r.jpg");
                    fd.append("apikey", "K81062382588957");
                    fd.append("language", "ita");

                    try {
                        // Aumentiamo il tempo di attesa con un fetch semplice
                        const response = await fetch("https://api.ocr.space/parse/image", {
                            method: "POST",
                            body: fd
                        });
                        const res = await response.json();
                        
                        if (res.ParsedResults && res.ParsedResults.length > 0) {
                            document.getElementById('i').value = res.ParsedResults[0].ParsedText;
                            msg.innerText = "✅ Testo estratto!";
                        } else {
                            msg.innerText = "⚠️ Riprova: testo non trovato.";
                        }
                    } catch (err) {
                        msg.innerText = "❌ Connessione lenta. Riprova tra un attimo.";
                    } finally {
                        btn.disabled = false;
                    }
                }, 'image/jpeg', 0.5); // Qualità 50% (massima velocità)
            };
        };
    }

    function salva() {
        const t = document.getElementById('t').value;
        const i = document.getElementById('i').value;
        if (!t) return alert("Inserisci un titolo!");
        db.ref('ricette').push({ title: t, ing: i }).then(() => {
            alert("✅ Salvata!");
            location.reload();
        });
    }
</script>
</body>
</html>
